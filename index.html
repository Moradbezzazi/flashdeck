<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDBDo1Uqzvy0XqdteOu5ycYXJtIKlCYd9rkosKYQUJRyQ2fu2YSadX1rwO8O1N0ZOY/exec";

// ─── STATE ───────────────────────────────────────────────────
let state = { projects: [] };
let currentProjectId = null;
let currentFilter = 'all';
let editingProjectId = null;
let editingCardId = null;
let reviewQueue = [], reviewIndex = 0, reviewStats = {}, cardFlipped = false;
let userToken = null;

// ─── UTILS ───────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const currentProject = () => state.projects.find(p => p.id === currentProjectId);

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function setSyncStatus(status){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');

  dot.className='sync-dot'+(
    status==='syncing'?' syncing':
    status==='error'?' error':''
  );

  txt.textContent=
    status==='syncing'?'Synchronisation…':
    status==='error'?'Erreur sync':
    'Synchronisé';
}

// ─── FETCH SAFE ───────────────────────────────────────────────
async function fetchJSON(url, options={}) {
  const res = await fetch(url,{
    mode:"cors",
    redirect:"follow",
    cache:"no-store",
    ...options
  });

  const text = await res.text();

  try{
    return JSON.parse(text);
  }catch(e){
    console.error("Invalid JSON:",text);
    throw new Error("Invalid JSON");
  }
}

// ─── API ─────────────────────────────────────────────────────
async function apiGet(action){
  const url =
    SCRIPT_URL +
    "?action=" + action +
    "&token=" + encodeURIComponent(userToken) +
    "&_=" + Date.now(); // anti cache

  return fetchJSON(url);
}

async function apiPost(body){
  return fetchJSON(SCRIPT_URL,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify({
      ...body,
      token:userToken
    })
  });
}

// ─── SYNC ────────────────────────────────────────────────────
async function syncToServer(){
  setSyncStatus('syncing');

  try{
    const res=await apiPost({
      action:"saveAll",
      data:state
    });

    if(res.error){
      setSyncStatus('error');
      toast("Erreur : "+res.error);
      return;
    }

    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
    toast("Erreur de synchronisation");
  }
}

// ─── AUTH ────────────────────────────────────────────────────
async function init(){
  const saved=sessionStorage.getItem("fd_token");

  if(saved){
    userToken=saved;
    await loadApp();
  }else{
    showAuth();
  }
}

function showAuth(){
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("authScreen").style.display="flex";
}

async function submitToken(){
  const token=document.getElementById("tokenInput").value.trim();
  if(!token)return;

  userToken=token;

  document.getElementById("authError").textContent="";
  document.getElementById("loadingScreen").style.display="flex";
  document.getElementById("authScreen").style.display="none";

  try{
    const data=await apiGet("getAll");

    if(data.error){
      throw new Error();
    }

    sessionStorage.setItem("fd_token",token);
    state=data;

    showApp();

  }catch(e){
    userToken=null;

    document.getElementById("loadingScreen").style.display="none";
    document.getElementById("authScreen").style.display="flex";
    document.getElementById("authError").textContent="❌ Token incorrect";
  }
}

async function loadApp(){
  try{
    const data=await apiGet("getAll");

    if(data.error) throw new Error();

    state=data;
    showApp();

  }catch(e){
    sessionStorage.removeItem("fd_token");
    userToken=null;
    showAuth();
  }
}

function showApp(){
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("mainApp").style.display="flex";

  renderSidebar();
  renderHome();
}

function logout(){
  sessionStorage.removeItem("fd_token");
  userToken=null;

  document.getElementById("mainApp").style.display="none";
  showAuth();
}

// ─── RESTE IDENTIQUE ─────────────────────────────────────────
// garde tout ton code existant après ceci
init();
</script>
